name: CraftHost CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  backend-tests:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
          
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json

    - name: Install Backend Dependencies
      working-directory: ./backend
      run: npm ci || npm install

    - name: Run Backend Tests
      working-directory: ./backend
      run: npm test
      env:
        # These are used for the integration tests. 
        # For actual production, set these in GitHub Repository Secrets!
        MONGODB_URI: ${{ secrets.MONGODB_URI }}
        JWT_SECRET: ${{ secrets.JWT_SECRET  }}
        NODE_ENV: test

  frontend-build:
    name: Frontend Build Verification
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Frontend Dependencies
      run: npm ci || npm install

    - name: Verify React Build
      run: npm run build
      env:
        VITE_API_BASE: /api

  deploy:
    name: Deploy to AWS VM
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Execute deployment commands via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.AWS_VM_IP }}
        username: ${{ secrets.AWS_VM_USERNAME }}
        key: ${{ secrets.AWS_VM_SSH_KEY }}
        script_stop: true
        command_timeout: 10m
        script: |
          set -e

          # 1. Install git if missing
          if ! command -v git &> /dev/null; then
            sudo yum install -y git || sudo apt-get update && sudo apt-get install -y git
          fi

          # 2. Ensure Node.js 20+ is installed
          NODE_MAJ=$(node -v 2>/dev/null | grep -oE '^v[0-9]+' | tr -d 'v' || echo 0)
          if [ "$NODE_MAJ" -lt 20 ]; then
            if command -v yum &> /dev/null; then
              sudo yum remove -y nodejs nodejs18 2>/dev/null || true
              sudo yum install -y nodejs20
            else
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi
          fi

          # 3. Clone or pull the repo
          if [ ! -d "/opt/crafthost-control" ]; then
            sudo git clone https://github.com/${{ github.repository }}.git /opt/crafthost-control
          else
            cd /opt/crafthost-control
            sudo git fetch --all
            sudo git reset --hard origin/main
          fi

          # 4. Fix ownership so npm doesn't need sudo
          sudo chown -R $(whoami):$(whoami) /opt/crafthost-control

          # 5. Install dependencies (no sudo needed now)
          cd /opt/crafthost-control
          npm install
          cd backend && npm install && cd ..

          # 6. Build frontend
          npm run build

          # 7. Install and run pm2
          sudo npm install -g pm2
          pm2 delete all 2>/dev/null || true
          pm2 start ./backend/control.js --name crafthost-api --max-memory-restart 512M
          pm2 start ./backend/scheduler.js --name crafthost-scheduler --max-memory-restart 256M
          pm2 save --force
          sudo env PATH=$PATH:$(which node | xargs dirname) pm2 startup systemd -u $(whoami) --hp $HOME 2>/dev/null || true
