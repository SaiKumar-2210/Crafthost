name: CraftHost CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  backend-tests:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
          
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json

    - name: Install Backend Dependencies
      working-directory: ./backend
      run: npm ci || npm install

    - name: Run Backend Tests
      working-directory: ./backend
      run: npm test
      env:
        # These are used for the integration tests. 
        # For actual production, set these in GitHub Repository Secrets!
        MONGODB_URI: ${{ secrets.MONGODB_URI }}
        JWT_SECRET: ${{ secrets.JWT_SECRET  }}
        NODE_ENV: test

  frontend-build:
    name: Frontend Build Verification
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Frontend Dependencies
      run: npm ci || npm install

    - name: Verify React Build
      run: npm run build
      env:
        VITE_API_BASE: /api

  deploy:
    name: Deploy to AWS VM
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Execute deployment commands via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.AWS_VM_IP }}
        username: ${{ secrets.AWS_VM_USERNAME }}
        key: ${{ secrets.AWS_VM_SSH_KEY }}
        script_stop: false
        command_timeout: 10m
        script: |
          echo "=== STEP 1: Check git ==="
          if ! command -v git &> /dev/null; then
            sudo yum install -y git 2>&1 || sudo apt-get update && sudo apt-get install -y git 2>&1
          fi
          echo "git: $(git --version)"

          echo "=== STEP 2: Check Node.js ==="
          NODE_MAJ=$(node -v 2>/dev/null | grep -oE '^v[0-9]+' | tr -d 'v' || echo 0)
          echo "Current Node major: $NODE_MAJ"
          if [ "$NODE_MAJ" -lt 20 ]; then
            if command -v yum &> /dev/null; then
              sudo yum remove -y nodejs nodejs18 2>/dev/null || true
              sudo yum install -y nodejs20 2>&1
            else
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash - 2>&1
              sudo apt-get install -y nodejs 2>&1
            fi
          fi
          echo "Node: $(node -v) | npm: $(npm -v)"

          echo "=== STEP 3: Clone or pull repo ==="
          if [ ! -d "/opt/crafthost-control" ]; then
            sudo git clone https://github.com/${{ github.repository }}.git /opt/crafthost-control 2>&1
          else
            cd /opt/crafthost-control
            sudo git fetch --all 2>&1
            sudo git reset --hard origin/main 2>&1
          fi

          echo "=== STEP 4: Fix ownership ==="
          sudo chown -R $(whoami):$(whoami) /opt/crafthost-control

          echo "=== STEP 5: Clean and install deps ==="
          cd /opt/crafthost-control
          rm -rf node_modules package-lock.json
          npm install 2>&1
          echo "--- Frontend deps done ---"
          cd backend
          rm -rf node_modules
          npm install 2>&1
          echo "--- Backend deps done ---"
          cd ..

          echo "=== STEP 6: Build frontend ==="
          npm run build 2>&1
          echo "--- Build done ---"

          echo "=== STEP 7: PM2 setup ==="
          sudo npm install -g pm2 2>&1
          export PATH=$PATH:$(dirname $(which pm2))
          pm2 delete all 2>/dev/null || true
          pm2 start ./backend/control.js --name crafthost-api --max-memory-restart 512M 2>&1 || echo "WARN: control.js pm2 start failed"
          pm2 start ./backend/scheduler.js --name crafthost-scheduler --max-memory-restart 256M 2>&1 || echo "WARN: scheduler.js pm2 start failed"
          pm2 save --force 2>&1
          echo "=== DEPLOY COMPLETE ==="
